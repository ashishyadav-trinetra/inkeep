# Railway config for the Manage UI (Next.js) service
# In Railway UI → Service Settings → Source → set "Config Path" to: railway/manage-ui.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.agents-manage-ui"

[deploy]
numReplicas = 1
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
